trigger:
- main

pool:
  vmImage: 'macos-latest'

variables:
  ANDROID_HOME: /Users/runner/Library/Android/sdk
  EMULATOR_NAME: xamarin_android_emulator

steps:
- task: CmdLine@2
  displayName: 'Install Latest .NET MAUI Workload'
  inputs:
    script: 'dotnet workload install maui maui-android maui-windows maui-ios maui-maccatalyst maui-tizen android ios maccatalyst macos mobile-librarybuilder tvos'

- task: CmdLine@2
  displayName: 'Check Workload List'
  inputs:
    script: 'dotnet workload list'

- script: |
    echo "##[group]Dotnet Tool Restore"
    cd /Users/runner//work/1/s/
    dotnet tool restore
    echo "##[endgroup]"
  displayName: 'Dotnet Tool Restore'

- script: |
    echo "##[group]Execute Dotnet Build Tasks"
    cd /Users/runner//work/1/s/
    dotnet cake --target=dotnet-buildtasks --workloads=global
    echo "##[endgroup]"
  displayName: 'Dotnet Build Tasks'
  continueOnError: true

